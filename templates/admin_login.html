{% extends "base.html" %}
{% block content %}
  <div class="login-container">
    <div class="card login-card">
      <div class="card-header">
        <i class="fas fa-lock"></i> Admin sign in
      </div>
      <div class="card-body">
        {% if request.args.get('error') %}
          <div class="alert alert-danger" role="alert">
            <i class="fas fa-circle-exclamation"></i> Invalid password. Please try again.
          </div>
        {% endif %}

        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

          <div class="mb-4">
            <label class="form-label" for="password">
              <i class="fas fa-key"></i> Password
            </label>
            <input id="password" type="password" name="password" class="form-control" placeholder="Enter admin password" required autofocus>
            <small class="form-text">Only administrators can access this section.</small>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            <i class="fas fa-right-to-bracket"></i> Sign in
          </button>
        </form>

        <div class="text-center-sm">
          <a href="/" class="btn btn-ghost btn-sm">
            <i class="fas fa-arrow-left"></i> Back to home
          </a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
