{% extends "base.html" %}
{% block content %}
  <div class="page-header">
    <div class="eyebrow">Ticket #{{ ticket.id }}</div>
    <h1 class="page-title">Mark ticket fixed</h1>
    <p class="page-subtitle">Confirm the resolution. The ticket is archived to the fixed-issues log for reference.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <i class="fas fa-circle-check"></i> {{ ticket.title }}
    </div>
    <div class="card-body">
      <div class="ticket-data mb-4">{{ ticket.description }}</div>

      <form method="post" action="{{ url_for('complete_ticket', ticket_id=ticket.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-3">
          <label class="form-label" for="fixed_by"><i class="fas fa-user"></i> Fixed by</label>
          <input id="fixed_by" class="form-control" name="fixed_by" placeholder="Your name or ID" required>
        </div>

        <div class="mb-3">
          <label class="form-label" for="notes"><i class="fas fa-note-sticky"></i> Notes</label>
          <textarea id="notes" class="form-control" name="notes" rows="3" placeholder="Optional notes about the fix"></textarea>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-success" type="submit"><i class="fas fa-check"></i> Confirm and archive</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('admin_index') }}"><i class="fas fa-xmark"></i> Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
